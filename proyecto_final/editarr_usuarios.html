<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Usuario - UTHH</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="barra-superior">
  <div class="barra-logo"><span></span><span>Consultorio UTHH</span></div>
  <nav class="menu-principal">
    <a href="plantilla.html"> Inicio</a>
    <a href="consultas.html"> Consultas</a>
    <a href="Listado.html"> Pacientes</a>
    <a href="registrar_usuarios.html"> Registrar</a>
    <a href="usuarios.html"> Usuarios</a>
    <a href="login.html" class="cerrar-sesion"> Cerrar sesión</a>
  </nav>
  <a href="perfil.html" class="usuario-link">👤 <span id="usuario-nombre"></span></a>
</header>

<main style="display:flex; justify-content:center; align-items:center; min-height:80vh; padding:20px;">
  <div class="card" style="width:100%; max-width:450px;">

    <div id="alerta" class="alerta" style="display:none;"></div>

    <h2 class="card-titulo"> Editar Usuario</h2>

    <div class="form-grupo">
      <label>Nombre</label>
      <input type="text" id="nombre">
    </div>
    <div class="form-grupo">
      <label>Correo</label>
      <input type="email" id="correo">
    </div>
    <div class="form-grupo">
      <label>Contraseña</label>
      <input type="password" id="contrasena" placeholder="Dejar vacío para no cambiar">
    </div>
    <div class="form-grupo">
      <label>Rol</label>
      <select id="rol">
        <option value="administrador">Administrador</option>
        <option value="medico">Médico</option>
        <option value="enfermera">Enfermera</option>
      </select>
    </div>

    <div style="display:flex; gap:10px; margin-top:16px;">
      <a href="usuarios.html" class="btn btn-cancelar" style="flex:1; text-align:center;">✖ Cancelar</a>
      <button class="btn btn-guardar" id="btn-guardar" onclick="guardarUsuario()" style="flex:1;"> Guardar Cambios</button>
    </div>

  </div>
</main>

<footer>
  <p>© 2025, Todos los derechos reservados</p>
  <p>Carretera Huejutla - Chalahuiyapa S/N, C.P. 43000, Huejutla de Reyes, Hidalgo, México | Tel: 789 896 2088 al 91</p>
</footer>

<script src="js/editarr_usuarios.js"></script>
</body>
</html>
