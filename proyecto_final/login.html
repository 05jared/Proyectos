<html lang="es">
<head>

  <title>Login - Sistema de Control de Pacientes UTHH</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


<header class="barra-superior">
  <div class="barra-logo"><span></span><span>Consultorio UTHH</span></div>
  <nav class="menu-principal">
    <a href="index.html">Inicio</a>
    <a href="login.html" class="activo">Acceso al Sistema</a>
    <a href="quienes_somos.html">ℹ ¿Quiénes Somos?</a>
  </nav>
</header>

<div class="login-wrapper">
  <div class="login-box">

    <div class="login-logo"></div>
    <h2 class="login-titulo">Iniciar sesión</h2>


    <div id="alerta" class="alerta danger" style="display:none;"></div>

    <div class="form-grupo">
      <label>Correo electrónico / Matrícula</label>
      <input type="text" id="email" placeholder="tu@correo.com o matrícula">
    </div>
    <div class="form-grupo">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="********">
   
      <label for="form-grupo"> Cuentas <br>
      admin@uthh.edu.mx 
      <br>Contraseña= admin123 <br><br>
      medico@uthh.edu.mx 
      <br>Contraseña= medico123 <br><br>
      recep@uthh.edu.mx 
      <br>Contraseña= recep123 <br><br>
      20230001 
      <br>Contraseña= pac123
      </label>
    </div>

    <div style="display:flex; gap:10px; margin-top:10px;">
      <a href="paginatrabajo.html" class="btn btn-cancelar" style="flex:1; text-align:center;">Regresar</a>
      <button class="btn btn-guardar" id="btn-login" onclick="iniciarSesion()" style="flex:1;">Iniciar sesión</button>
    </div>

  </div>
</div>
