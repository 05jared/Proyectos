<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Usuario - UTHH</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="barra-superior">
  <div class="barra-logo"><span>🏥</span><span>Consultorio UTHH</span></div>
  <nav class="menu-principal">
    <a href="plantilla.html">🏠 Inicio</a>
    <a href="consultas.html">📋 Consultas</a>
    <a href="listado.html">👥 Pacientes</a>
    <a href="perfil.html">👤 Perfil</a>
    <a href="registrar_usuario.html" class="activo">➕ Registrar</a>
    <a href="login.html" class="cerrar-sesion">🚪 Cerrar sesión</a>
  </nav>
  <a href="perfil.html" class="usuario-link">
    👤 <span id="usuario-nombre"></span>
  </a>
</header>

<main style="display:flex; justify-content:center; align-items:center; min-height:80vh;">

  <div class="card" style="width:100%; max-width:440px;">

    <!-- JS mostrará éxito o error aquí -->
    <div id="alerta" class="alerta" style="display:none;"></div>

    <div style="text-align:center; font-size:3em; margin-bottom:10px;">👤</div>
    <h2 class="card-titulo" style="text-align:center;">Registro de nuevo usuario</h2>

    <div class="form-grupo">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Nombre y apellidos">
    </div>
    <div class="form-grupo">
      <label>Correo electrónico</label>
      <input type="email" id="correo" placeholder="tu@correo.com">
    </div>
    <div class="form-grupo">
      <label>Contraseña</label>
      <input type="password" id="contrasena" placeholder="********">
    </div>
    <div class="form-grupo">
      <label>Rol</label>
      <select id="rol">
        <option value="administrador">Administrador</option>
        <option value="medico">Médico</option>
        <option value="enfermera">Enfermera</option>
      </select>
    </div>

    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="btn btn-cancelar" onclick="history.back()">Regresar</button>
      <button class="btn btn-guardar" id="btn-registrar" onclick="registrarUsuario()">Registrar</button>
    </div>

  </div>

</main>

<footer>
  <p>© 2025, Todos los derechos reservados</p>
  <p>Carretera Huejutla - Chalahuiyapa S/N, C.P. 43000, Huejutla de Reyes, Hidalgo, México | Tel: 789 896 2088 al 91</p>
</footer>

<script src="js/registrar_usuarios.js"></script>
</body>
</html>
