<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuario — Consultorio UTHH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/sistema.css">
</head>
<body>

  <header class="sys-navbar">
    <div class="sys-navbar-inner">
      <a href="logeoadmin.html" class="sys-navbar-logo">
        <img src="https://res.cloudinary.com/dffswlrkh/image/upload/v1773809668/pxn7noa5cgnykhsrh8fr.jpg" alt="Logo">
        <span class="sys-navbar-nombre">Consultorio UTHH</span>
      </a>
      <nav class="sys-nav-links">
        <a href="logeoadmin.html">Inicio</a>
        <a href="consultas.html">Consultas</a>
        <a href="pacientes.html">Pacientes</a>
        <a href="usuarios.html" class="activo">Usuarios</a>
      </nav>
      <div class="sys-navbar-derecha">
        <div class="sys-usuario-info">
          <div class="sys-usuario-avatar">👤</div>
          <span id="nombre-usuario">Cargando...</span>
        </div>
        <a href="login.html" class="sys-btn-salir" onclick="cerrarSesion()">Cerrar sesión</a>
      </div>
    </div>
  </header>

  <main class="sys-main">

    <div class="sys-page-header">
      <div>
        <h1 class="sys-page-titulo" id="titulo-pagina">Nuevo Usuario</h1>
        <p class="sys-page-sub">Completa los datos del usuario.</p>
      </div>
      <a href="usuarios.html" class="btn-sys-primario" style="background:var(--texto-suave);">← Volver</a>
    </div>

    <div class="sys-card" style="max-width:560px;">
      <h2 class="sys-card-titulo">🔑 Datos del Usuario</h2>

      <div class="modal-campo">
        <label class="modal-label">Nombre *</label>
        <input type="text" class="modal-input" id="input-nombre" placeholder="Nombre(s)">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Apellido Paterno *</label>
        <input type="text" class="modal-input" id="input-apellido-paterno">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Apellido Materno</label>
        <input type="text" class="modal-input" id="input-apellido-materno">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Correo Electrónico *</label>
        <input type="email" class="modal-input" id="input-correo" placeholder="correo@uthh.edu.mx">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Contraseña *</label>
        <input type="password" class="modal-input" id="input-contrasena" placeholder="••••••••">
        <small style="font-size:11px;color:var(--texto-suave);margin-top:4px;display:block;" id="hint-pass">Mínimo 6 caracteres.</small>
      </div>
      <div class="modal-campo">
        <label class="modal-label">Rol *</label>
        <select class="modal-select" id="input-rol">
          <option value="">— Selecciona —</option>
          <option value="Administrador">Administrador</option>
          <option value="Recepcionista">Recepcionista</option>
          <option value="Doctora">Doctora</option>
        </select>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:28px;padding-top:20px;border-top:1px solid var(--borde);">
        <a href="usuarios.html" class="btn-modal-cancelar">Cancelar</a>
        <button class="btn-modal-guardar" id="btn-guardar" onclick="guardarUsuario()" style="padding:12px 32px;font-size:14px;">
          💾 Guardar Usuario
        </button>
      </div>
    </div>

  </main>

  <div class="toast" id="toast"></div>

  <footer class="sys-footer">© 2025 Servicio Médico UTHH — Todos los derechos reservados</footer>

  <script src="js/registrar_usuario.js"></script>
</body>
</html>
