<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Mis Datos — Consultorio UTHH</title>
  <link rel="stylesheet" href="styles/sistema.css">
</head>
<body>

  <header class="sys-navbar">
    <div class="sys-navbar-inner">
      <a href="logeopacientes.html" class="sys-navbar-logo">
        <img src="https://res.cloudinary.com/dffswlrkh/image/upload/v1773809668/pxn7noa5cgnykhsrh8fr.jpg" alt="Logo">
        <span class="sys-navbar-nombre">Consultorio UTHH</span>
      </a>
      <nav class="sys-nav-links">
        <a href="logeopacientes.html">Historial</a>
      </nav>
      <a href="editar_personal.html" class="sys-usuario-info" style="text-decoration:none; cursor:pointer;">
        <div class="sys-usuario-avatar">👤</div>
        <span id="nombre-usuario">Cargando...</span>
      </a>
      <a href="login.html" class="sys-btn-salir" onclick="cerrarSesion()">Cerrar sesión</a>
    </div>
  </header>

  <main class="sys-main" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">

    <div class="sys-page-header" style="width:100%; max-width:560px;">
      <div>
        <h1 class="sys-page-titulo">Editar Mis Datos</h1>
        <p class="sys-page-sub">Actualiza tu información personal.</p>
      </div>
      <a href="logeopacientes.html" class="btn-sys-primario" style="background:var(--texto-suave);">← Volver</a>
    </div>

    <div class="sys-card" style="width:100%; max-width:560px;">

      <div id="alerta" class="toast" style="position:relative;bottom:auto;right:auto;transform:none;opacity:1;margin-bottom:16px;display:none;"></div>

      <div class="modal-campo">
        <label class="modal-label">Nombre</label>
        <input type="text" class="modal-input" id="nombre">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Apellido Paterno</label>
        <input type="text" class="modal-input" id="apellido-paterno">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Apellido Materno</label>
        <input type="text" class="modal-input" id="apellido-materno">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Fecha de Nacimiento</label>
        <input type="date" class="modal-input" id="fecha-nacimiento">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Correo Electrónico</label>
        <input type="email" class="modal-input" id="correo">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Teléfono</label>
        <input type="text" class="modal-input" id="telefono">
      </div>

      <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:28px; padding-top:20px; border-top:1px solid var(--borde);">
        <a href="logeopacientes.html" class="btn-modal-cancelar">Volver</a>
        <button class="btn-modal-guardar" id="btn-guardar" onclick="guardarDatos()">
          💾 Guardar Cambios
        </button>
      </div>

    </div>

  </main>

  <div class="toast" id="toast"></div>

  <footer class="sys-footer">© 2025 Servicio Médico UTHH — Todos los derechos reservados</footer>

  <script src="js/editar_personal.js"></script>
</body>
</html>
