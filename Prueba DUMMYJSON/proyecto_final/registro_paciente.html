<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paciente — Consultorio UTHH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/sistema.css">
</head>
<body>

  <header class="sys-navbar">
    <div class="sys-navbar-inner">
      <a href="logeoadmin.html" class="sys-navbar-logo">
        <img src="https://res.cloudinary.com/dffswlrkh/image/upload/v1773809668/pxn7noa5cgnykhsrh8fr.jpg" alt="Logo">
        <span class="sys-navbar-nombre">Consultorio UTHH</span>
      </a>
      <nav class="sys-nav-links">
        <a href="logeoadmin.html">Inicio</a>
        <a href="consultas.html">Consultas</a>
        <a href="pacientes.html" class="activo">Pacientes</a>
        <a href="usuarios.html">Usuarios</a>
      </nav>
      <div class="sys-navbar-derecha">
        <div class="sys-usuario-info">
          <div class="sys-usuario-avatar">👤</div>
          <span id="nombre-usuario">Cargando...</span>
        </div>
        <a href="login.html" class="sys-btn-salir" onclick="cerrarSesion()">Cerrar sesión</a>
      </div>
    </div>
  </header>

  <main class="sys-main">

    <div class="sys-page-header">
      <div>
        <h1 class="sys-page-titulo" id="titulo-pagina">Nuevo Paciente</h1>
        <p class="sys-page-sub">Completa los datos del paciente.</p>
      </div>
      <a href="pacientes.html" class="btn-sys-primario" style="background:var(--texto-suave);">← Volver</a>
    </div>

    <div class="sys-card">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:32px;">

        <!-- DATOS PERSONALES -->
        <div>
          <h2 class="sys-card-titulo">📋 Datos Personales</h2>

          <div class="modal-campo">
            <label class="modal-label">Nombre *</label>
            <input type="text" class="modal-input" id="input-nombre" placeholder="Nombre(s)">
          </div>
          <div class="modal-campo">
            <label class="modal-label">Apellido Paterno *</label>
            <input type="text" class="modal-input" id="input-apellido-paterno">
          </div>
          <div class="modal-campo">
            <label class="modal-label">Apellido Materno</label>
            <input type="text" class="modal-input" id="input-apellido-materno">
          </div>
          <div class="modal-campo">
            <label class="modal-label">Fecha de Nacimiento *</label>
            <input type="date" class="modal-input" id="input-fecha-nacimiento">
          </div>
          <div class="modal-campo">
            <label class="modal-label">Sexo *</label>
            <select class="modal-select" id="input-sexo">
              <option value="">— Selecciona —</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
            </select>
          </div>
          <div class="modal-campo">
            <label class="modal-label">Correo Electrónico</label>
            <input type="email" class="modal-input" id="input-correo" placeholder="correo@ejemplo.com">
          </div>
          <div class="modal-campo">
            <label class="modal-label">Teléfono</label>
            <input type="text" class="modal-input" id="input-telefono" placeholder="10 dígitos">
          </div>
          <div class="modal-campo">
            <label class="modal-label">Dirección</label>
            <input type="text" class="modal-input" id="input-direccion" placeholder="Calle, colonia, municipio">
          </div>
        </div>

        <!-- DATOS INSTITUCIONALES -->
        <div>
          <h2 class="sys-card-titulo">🏫 Datos Institucionales</h2>

          <div class="modal-campo">
            <label class="modal-label">Tipo de Paciente *</label>
            <select class="modal-select" id="input-tipo" onchange="mostrarCamposAlumno()">
              <option value="">— Selecciona —</option>
            </select>
          </div>
          <div class="modal-campo">
            <label class="modal-label">Matrícula / N° Trabajador *</label>
            <input type="text" class="modal-input" id="input-matricula" placeholder="Ej: 20230001">
          </div>

          <div id="bloque-alumno" style="display:none;">
            <div class="modal-campo">
              <label class="modal-label">Carrera</label>
              <select class="modal-select" id="input-carrera">
                <option value="">— Selecciona —</option>
                <option value="Tic's">Tic's</option>
                <option value="Mecatronica">Mecatronica</option>
              </select>
            </div>
            <div class="modal-campo">
              <label class="modal-label">Cuatrimestre</label>
              <select class="modal-select" id="input-cuatrimestre">
                <option value="">— Selecciona —</option>
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option>
                <option>7</option><option>8</option><option>9</option>
              </select>
            </div>
            <div class="modal-campo">
              <label class="modal-label">Grupo</label>
              <select class="modal-select" id="input-grupo">
                <option value="">— Selecciona —</option>
                <option>A</option><option>B</option><option>C</option><option>D</option>
              </select>
            </div>
          </div>

        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:28px; padding-top:20px; border-top:1px solid var(--borde);">
        <a href="pacientes.html" class="btn-modal-cancelar">Cancelar</a>
        <button class="btn-modal-guardar" id="btn-guardar" onclick="guardarPaciente()" style="padding:12px 32px; font-size:14px;">
          💾 Guardar Paciente
        </button>
      </div>

    </div>

  </main>

  <div class="toast" id="toast"></div>

  <footer class="sys-footer">© 2025 Servicio Médico UTHH — Todos los derechos reservados</footer>

  <script src="js/registro_paciente.js"></script>
</body>
</html>
