<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Consulta - UTHH</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="barra-superior">
  <div class="barra-logo"><span>🏥</span><span>Consultorio UTHH</span></div>
  <nav class="menu-principal">
    <a href="plantilla.html"> Inicio</a>
    <a href="consultas.html"> Consultas</a>
    <a href="Listado.html"> Pacientes</a>
    <a href="registrar_usuarios.html"> Registrar</a>
    <a href="login.html" class="cerrar-sesion">🚪 Cerrar sesión</a>
  </nav>
  <a href="perfil.html" class="usuario-link">👤 <span id="usuario-nombre"></span></a>
</header>

<main style="padding:30px 20px; display:flex; justify-content:center;">
  <div class="card" style="width:100%; max-width:750px;">

    <h2 class="card-titulo"> Editar Consulta <span id="consulta-id"></span></h2>

    <div id="alerta" class="alerta" style="display:none;"></div>

    <div class="form-grupo">
      <label> Paciente</label>

      <input type="text" id="con-paciente" readonly>
    </div>
    <div class="form-grid-2">
      <div class="form-grupo">
        <label> Fecha <span style="color:#9e1b34;">*</span></label>
        <input type="date" id="con-fecha">
      </div>
      <div class="form-grupo">
        <label> Hora de entrada <span style="color:#9e1b34;">*</span></label>
        <input type="time" id="con-hora-entrada">
      </div>
      <div class="form-grupo">
        <label> Hora de salida</label>
        <input type="time" id="con-hora-salida">
      </div>
    </div>
    <div class="form-grupo">
      <label> Motivo de consulta <span style="color:#9e1b34;">*</span></label>
      <textarea id="con-motivo"></textarea>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
      <a href="consultas.html" class="btn btn-cancelar">✖ Cancelar</a>
      <button class="btn btn-guardar" id="btn-guardar" onclick="guardarConsulta()" style="flex:1;"> Guardar Cambios</button>
    </div>

  </div>
</main>

<footer>
  <p>© 2025, Todos los derechos reservados</p>
  <p>Carretera Huejutla - Chalahuiyapa S/N, C.P. 43000, Huejutla de Reyes, Hidalgo, México | Tel: 789 896 2088 al 91</p>
</footer>

<script src="js/editar_consulta.js"></script>
</body>
</html>
